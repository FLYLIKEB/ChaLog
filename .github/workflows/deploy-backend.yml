name: Deploy Backend to EC2

on:
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch: # 수동 실행 가능

concurrency:
  group: deploy-backend
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for package-lock.json
        id: check_lockfile
        working-directory: ./backend
        run: |
          if [ -f package-lock.json ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: ${{ steps.check_lockfile.outputs.exists == 'true' && 'npm' || '' }}
          cache-dependency-path: ${{ steps.check_lockfile.outputs.exists == 'true' && 'backend/package-lock.json' || '' }}

      - name: Ensure package-lock.json exists
        if: steps.check_lockfile.outputs.exists == 'false'
        working-directory: ./backend
        run: |
          echo "⚠️ package-lock.json이 없습니다. 생성 중..."
          npm install --package-lock-only --legacy-peer-deps --no-workspaces

      - name: Install dependencies
        working-directory: ./backend
        env:
          NPM_CONFIG_WORKSPACES: "false"
          NPM_CONFIG_LEGACY_PEER_DEPS: "true"
        run: |
          echo "📦 npm ci (--no-workspaces) 실행 중..."
          if ! npm ci --legacy-peer-deps --no-workspaces --include-workspace-root=false; then
            echo "❌ npm ci 실패!"
            echo "package-lock.json과 package.json을 동기화한 뒤 다시 실행하세요."
            exit 1
          fi
          
          REQUIRED_PACKAGES=("typeorm" "@nestjs/typeorm" "@nestjs/common" "@nestjs/core" "class-transformer" "class-validator" "rxjs" "mysql2")
          echo "🔍 필수 패키지 확인 중..."
          for pkg in "${REQUIRED_PACKAGES[@]}"; do
            if [ -d "node_modules/$pkg" ]; then
              echo "✅ $pkg 확인됨"
            else
              echo "❌ $pkg 누락됨! package.json을 확인하세요."
              exit 1
            fi
          done

      - name: Build application
        working-directory: ./backend
        run: |
          if [ ! -d "node_modules/typeorm" ]; then
            echo "❌ typeorm 누락! package.json을 확인하세요."
            exit 1
          fi
          npm run build

      - name: Create deployment package
        working-directory: ./backend
        run: |
          mkdir -p deploy-package
          cp -r dist deploy-package/
          cp -r migrations deploy-package/  # Migration 파일 포함
          cp src/database/data-source.ts deploy-package/dist/src/database/ 2>/dev/null || cp src/database/data-source.ts deploy-package/  # data-source.ts 포함 (Migration 실행용)
          cp package.json package-lock.json ecosystem.config.js deploy-package/
          tar -czf deploy.tar.gz -C deploy-package .

      - name: Configure SSH
        env:
          EC2_HOST: ${{ secrets.EC2_HOST || '' }}
          EC2_USER: ${{ secrets.EC2_USER || '' }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY || '' }}
        run: |
          # 환경 변수 확인
          echo "🔍 환경 변수 확인:"
          echo "EC2_HOST: ${EC2_HOST:+설정됨 (길이: ${#EC2_HOST})}${EC2_HOST:-❌ 설정되지 않음}"
          echo "EC2_USER: ${EC2_USER:+설정됨 (값: '$EC2_USER')}${EC2_USER:-❌ 설정되지 않음}"
          echo "EC2_SSH_KEY: ${EC2_SSH_KEY:+설정됨 (길이: ${#EC2_SSH_KEY})}${EC2_SSH_KEY:-❌ 설정되지 않음}"
          
          # 필수 변수 확인 (빈 문자열도 체크)
          MISSING_SECRETS=()
          if [ -z "${EC2_HOST:-}" ] || [ "$EC2_HOST" = "" ]; then
            MISSING_SECRETS+=("EC2_HOST")
          fi
          if [ -z "${EC2_USER:-}" ] || [ "$EC2_USER" = "" ]; then
            MISSING_SECRETS+=("EC2_USER")
          fi
          if [ -z "${EC2_SSH_KEY:-}" ] || [ "$EC2_SSH_KEY" = "" ]; then
            MISSING_SECRETS+=("EC2_SSH_KEY")
          fi
          
          if [ ${#MISSING_SECRETS[@]} -gt 0 ]; then
            echo "❌ 필수 Secrets가 설정되지 않았습니다!"
            echo "누락된 Secrets:"
            for secret in "${MISSING_SECRETS[@]}"; do
              echo "  - $secret"
            done
            echo ""
            echo "설정 방법:"
            echo "1. GitHub 저장소 → Settings → Secrets and variables → Actions"
            echo "2. New repository secret 클릭"
            echo "3. Name과 Secret 값 입력"
            echo ""
            echo "자세한 내용: docs/GITHUB_SECRETS_CHECKLIST.md"
            exit 1
          fi
          
          echo "✅ 모든 필수 Secrets가 설정되었습니다!"
          
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          
          # SSH 키 저장 (줄바꿈 보존)
          echo "$EC2_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          
          # SSH 키 형식 확인
          echo "🔑 SSH 키 형식 확인:"
          head -1 ~/.ssh/deploy_key
          tail -1 ~/.ssh/deploy_key
          echo "키 파일 크기: $(wc -c < ~/.ssh/deploy_key) bytes"
          echo "키 파일 줄 수: $(wc -l < ~/.ssh/deploy_key) 줄"
          
          # SSH 키 형식 검증
          if ! grep -q "BEGIN.*PRIVATE KEY" ~/.ssh/deploy_key; then
            echo "❌ SSH 키 형식 오류: 'BEGIN PRIVATE KEY'를 찾을 수 없습니다!"
            echo "EC2_SSH_KEY Secret이 올바른 형식인지 확인하세요."
            exit 1
          fi
          
          if ! grep -q "END.*PRIVATE KEY" ~/.ssh/deploy_key; then
            echo "❌ SSH 키 형식 오류: 'END PRIVATE KEY'를 찾을 수 없습니다!"
            echo "EC2_SSH_KEY Secret이 올바른 형식인지 확인하세요."
            exit 1
          fi
          
          echo "✅ SSH 키 형식 검증 통과"
          
          # DNS 해석 (IPv4/IPv6 구분)
          echo "🔍 DNS 해석:"
          echo "  IPv4: $(getent ahostsv4 "$EC2_HOST" 2>/dev/null | head -1 | awk '{print $1}' || echo '해석 실패')"
          echo "  IPv6: $(getent ahostsv6 "$EC2_HOST" 2>/dev/null | head -1 | awk '{print $1}' || echo '해석 실패/없음')"
          EC2_IPV4=$(getent ahostsv4 "$EC2_HOST" 2>/dev/null | head -1 | awk '{print $1}')
          if [ -z "$EC2_IPV4" ]; then
            EC2_IPV4="$EC2_HOST"
            echo "  (호스트명이 IP이거나 IPv4 해석 실패, $EC2_HOST 사용)"
          fi
          echo ""
          
          # 포트 22 연결 테스트 (IPv4 우선, 타임아웃 15초)
          echo "🔍 포트 22 연결 테스트 중 (IPv4: $EC2_IPV4)..."
          if timeout 15 bash -c "</dev/tcp/$EC2_IPV4/22" 2>/dev/null; then
            echo "✅ 포트 22 열림"
          else
            echo "❌ 포트 22 닫힘 또는 타임아웃"
            echo "⚠️ Lightsail 방화벽에서 SSH(22번 포트)가 GitHub Actions IP에서 접근 가능한지 확인하세요."
            echo "   자세한 내용: docs/SSH_CONNECTION_TIMEOUT_TROUBLESHOOTING.md"
            exit 1
          fi
          echo ""
          
          # EC2 호스트 키 추가
          echo "🔐 EC2 호스트 키 추가 중..."
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts 2>&1 || true
          chmod 644 ~/.ssh/known_hosts
          
          # SSH 연결 테스트 (실패 시 즉시 종료)
          echo "🔍 SSH 연결 테스트 중..."
          if ! ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=15 \
              -o BatchMode=yes \
              "$EC2_USER@$EC2_HOST" \
              "echo 'SSH 연결 성공!'" 2>&1; then
            echo ""
            echo "❌ SSH 연결 실패!"
            echo ""
            echo "🔍 문제 진단:"
            echo "1. EC2_SSH_KEY Secret 확인: GitHub 저장소 → Settings → Secrets → EC2_SSH_KEY"
            echo "2. 인스턴스 authorized_keys에 해당 공개 키가 있는지 확인"
            echo "3. EC2 사용자명 확인: Ubuntu=ubuntu, Amazon Linux=ec2-user"
            echo ""
            echo "자세한 내용: docs/deployment/SSH_CONNECTION_TROUBLESHOOTING.md"
            exit 1
          fi
          echo "✅ SSH 연결 테스트 성공!"

      - name: Upload deployment files
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_DATABASE_URL: ${{ secrets.EC2_DATABASE_URL }}
          EC2_JWT_SECRET: ${{ secrets.EC2_JWT_SECRET }}
          EC2_FRONTEND_URL: ${{ secrets.EC2_FRONTEND_URL }}
          EC2_FRONTEND_URLS: ${{ secrets.EC2_FRONTEND_URLS }}
        run: |
          if [ -z "${EC2_HOST:-}" ] || [ -z "${EC2_USER:-}" ]; then
            echo "❌ EC2_HOST 또는 EC2_USER가 설정되지 않았습니다!"
            exit 1
          fi
          
          echo "🔍 배포 대상: $EC2_USER@$EC2_HOST"
          
          # 배포 파일 전송
          echo "📤 배포 파일 전송 중..."
          scp -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              -o ConnectTimeout=10 \
              backend/deploy.tar.gz \
              "$EC2_USER@$EC2_HOST:/tmp/"

          # .env 파일 생성 및 업로드 (특수문자 안전 처리)
          echo "📤 .env 파일 생성 중..."
          
          if [ -z "${EC2_DATABASE_URL:-}" ]; then
            echo "⚠️ EC2_DATABASE_URL이 설정되지 않았습니다. GitHub Secrets에 설정하세요."
            exit 1
          fi
          
          if [ -z "${EC2_JWT_SECRET:-}" ]; then
            echo "⚠️ EC2_JWT_SECRET이 설정되지 않았습니다. GitHub Secrets에 설정하세요."
            exit 1
          fi
          
          mkdir -p /tmp/deploy_env
          {
            printf 'DATABASE_URL=%s\n' "$EC2_DATABASE_URL"
            printf 'DB_SYNCHRONIZE=false\n'
            printf 'DB_SSL_ENABLED=false\n'
            printf 'DB_SSL_REJECT_UNAUTHORIZED=false\n'
            printf 'JWT_SECRET=%s\n' "$EC2_JWT_SECRET"
            printf 'JWT_EXPIRES_IN=7d\n'
            printf 'PORT=3000\n'
            printf 'NODE_ENV=production\n'
            printf 'FRONTEND_URL=%s\n' "${EC2_FRONTEND_URL:-https://cha-log-gilt.vercel.app}"
            printf 'FRONTEND_URLS=%s\n' "${EC2_FRONTEND_URLS:-https://cha-log-gilt.vercel.app,http://localhost:5173,http://localhost:5174}"
          } > /tmp/deploy_env/.env
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$EC2_USER@$EC2_HOST" "mkdir -p /home/ubuntu/chalog-backend"
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no /tmp/deploy_env/.env "$EC2_USER@$EC2_HOST:/home/ubuntu/chalog-backend/.env"
          ssh -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no "$EC2_USER@$EC2_HOST" "chmod 600 /home/ubuntu/chalog-backend/.env"
          rm -rf /tmp/deploy_env
          echo "✅ .env 파일 업로드 완료"

      - name: Run deployment on server
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key \
              -o StrictHostKeyChecking=no \
              "$EC2_USER@$EC2_HOST" << 'ENDSSH'
            set -e
            
            BACKEND_DIR="/home/ubuntu/chalog-backend"
            
            # curl 설치 확인
            if ! command -v curl &> /dev/null; then
              echo "📦 curl 설치 중..."
              sudo apt-get update
              sudo apt-get install -y curl
            fi
            
            # Node.js 설치 확인 및 설치
            if ! command -v node &> /dev/null || ! command -v npm &> /dev/null; then
              echo "📦 Node.js/npm이 설치되지 않았습니다. 설치 중..."
              curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
              sudo apt-get install -y nodejs
              
              # 명령어 캐시 새로고침
              hash -r
              
              # PATH에 Node.js 경로 추가
              export PATH="/usr/bin:/usr/local/bin:$PATH"
              
              # 설치 확인 (전체 경로로도 시도)
              if command -v node &> /dev/null || [ -f /usr/bin/node ]; then
                NODE_CMD=$(command -v node || echo "/usr/bin/node")
                NPM_CMD=$(command -v npm || echo "/usr/bin/npm")
                
                if [ -f "$NODE_CMD" ] && [ -f "$NPM_CMD" ]; then
                  echo "✅ Node.js 설치 완료: $($NODE_CMD --version)"
                  echo "✅ npm 설치 완료: $($NPM_CMD --version)"
                  # 심볼릭 링크 생성 (필요시)
                  [ ! -f /usr/local/bin/node ] && sudo ln -sf "$NODE_CMD" /usr/local/bin/node || true
                  [ ! -f /usr/local/bin/npm ] && sudo ln -sf "$NPM_CMD" /usr/local/bin/npm || true
                else
                  echo "❌ Node.js/npm 설치 실패!"
                  echo "Node.js 경로: $NODE_CMD"
                  echo "npm 경로: $NPM_CMD"
                  exit 1
                fi
              else
                echo "❌ Node.js/npm 설치 실패!"
                exit 1
              fi
            else
              echo "✅ Node.js 이미 설치됨: $(node --version)"
              echo "✅ npm 이미 설치됨: $(npm --version)"
            fi
            
            # npm 경로 확인
            echo "🔍 npm 경로: $(which npm || echo '/usr/bin/npm')"
            echo "🔍 node 경로: $(which node || echo '/usr/bin/node')"
            
            # 디렉토리 생성
            mkdir -p $BACKEND_DIR
            cd $BACKEND_DIR
            
            # 기존 파일 백업
            if [ -d "dist" ]; then
              echo "💾 기존 파일 백업 중..."
              BACKUP_DIR="/home/ubuntu/backups"
              mkdir -p $BACKUP_DIR
              tar -czf $BACKUP_DIR/backup-$(date +%Y%m%d-%H%M%S).tar.gz \
                  dist/ package.json package-lock.json ecosystem.config.js 2>/dev/null || true
            fi
            
            # 배포 파일 압축 해제
            echo "📦 배포 파일 압축 해제 중..."
            tar -xzf /tmp/deploy.tar.gz -C $BACKEND_DIR
            
            # 의존성 설치
            echo "📥 의존성 설치 중..."
            # npm 경로 확인 후 사용
            NPM_CMD=$(command -v npm || echo "/usr/bin/npm")
            if [ ! -f "$NPM_CMD" ]; then
              echo "❌ npm을 찾을 수 없습니다: $NPM_CMD"
              exit 1
            fi
            
            # 기존 node_modules 정리 (필요시)
            if [ -d "node_modules" ]; then
              echo "🧹 기존 node_modules 정리 중..."
              rm -rf node_modules
            fi
            
            # package-lock.json 확인
            if [ ! -f "package-lock.json" ]; then
              echo "⚠️ package-lock.json이 없습니다. 최신 backend/package-lock.json을 커밋하세요."
              exit 1
            fi
            
            echo "📦 npm ci 실행 중..."
            if ! $NPM_CMD ci --legacy-peer-deps --no-audit --no-fund; then
              echo "❌ npm ci 실패! package-lock.json을 확인하세요."
              exit 1
            fi
            
            echo "🧹 devDependencies 제거 중..."
            $NPM_CMD prune --production
            
            echo "🔍 필수 패키지 확인 중..."
            REQUIRED_PACKAGES=("class-transformer" "class-validator" "rxjs" "typeorm" "@nestjs/common" "@nestjs/core" "mysql2")
            for pkg in "${REQUIRED_PACKAGES[@]}"; do
              if [ -d "node_modules/$pkg" ]; then
                echo "✅ $pkg 확인됨"
              else
                echo "❌ $pkg 누락됨! package.json을 업데이트한 뒤 다시 배포하세요."
                exit 1
              fi
            done
            
            # PM2 설치 확인 및 설치
            NPM_CMD=$(command -v npm || echo "/usr/bin/npm")
            if ! command -v pm2 &> /dev/null; then
              echo "📦 PM2가 설치되지 않았습니다. 설치 중..."
              sudo $NPM_CMD install -g pm2
              hash -r
              PM2_CMD=$(command -v pm2 || echo "/usr/local/bin/pm2")
              if [ -f "$PM2_CMD" ]; then
                echo "✅ PM2 설치 완료: $($PM2_CMD --version)"
                
                # PM2 부팅 시 자동 시작 설정
                echo "⚙️ PM2 부팅 시 자동 시작 설정 중..."
                $PM2_CMD startup systemd -u ubuntu --hp /home/ubuntu || echo "PM2 startup 설정은 수동으로 실행해야 할 수 있습니다."
              else
                echo "⚠️ PM2 설치 후 경로를 찾을 수 없습니다."
                exit 1
              fi
            else
              PM2_CMD=$(command -v pm2)
              echo "✅ PM2 이미 설치됨: $($PM2_CMD --version)"
            fi
            
            # 데이터베이스 마이그레이션 실행
            echo "🔄 데이터베이스 마이그레이션 실행 중..."
            export $(cat .env | xargs)
            # migrations 폴더와 data-source.ts가 배포 패키지에 포함되어 있으므로 실행 가능
            # data-source.ts 경로 확인 (배포 패키지 구조에 따라)
            if [ -f "dist/src/database/data-source.ts" ]; then
              DATA_SOURCE_PATH="dist/src/database/data-source.ts"
            elif [ -f "src/database/data-source.ts" ]; then
              DATA_SOURCE_PATH="src/database/data-source.ts"
            else
              echo "⚠️ data-source.ts 파일을 찾을 수 없습니다. 마이그레이션을 건너뜁니다."
              DATA_SOURCE_PATH=""
            fi
            
            if [ -n "$DATA_SOURCE_PATH" ] && [ -d "migrations" ]; then
              if npx typeorm-ts-node-commonjs migration:run -d "$DATA_SOURCE_PATH"; then
                echo "✅ 마이그레이션 완료"
              else
                echo "⚠️ 마이그레이션 실행 중 오류 발생. 계속 진행합니다."
              fi
            else
              echo "⚠️ 마이그레이션 파일이 없습니다. 건너뜁니다."
            fi
            
            # PM2로 재시작
            echo "🔄 PM2로 앱 재시작 중..."
            $PM2_CMD delete chalog-backend 2>/dev/null || true
            
            # 환경 변수 파일 확인
            if [ ! -f ".env" ]; then
              echo "⚠️ .env 파일이 없습니다. 기본값 사용"
            else
              echo "✅ .env 파일 존재"
            fi
            
            # PM2 시작
            $PM2_CMD start ecosystem.config.js
            $PM2_CMD save
            
            # 시작 확인
            sleep 2
            PM2_STATUS=$($PM2_CMD status | grep chalog-backend | awk '{print $10}')
            echo "📊 PM2 초기 상태: $PM2_STATUS"
            
            # Health check (최대 5회, 5초 간격 재시도)
            echo "🏥 Health check..."
            PM2_CMD=$(command -v pm2 || echo "/usr/local/bin/pm2")
            echo "📊 PM2 상태:"
            $PM2_CMD status || true
            
            HEALTH_OK=false
            for i in 1 2 3 4 5; do
              sleep 5
              if curl -f http://localhost:3000/api/health > /dev/null 2>&1; then
                echo "✅ 배포 성공! Health check 통과"
                HEALTH_OK=true
                break
              fi
              echo "  시도 $i/5: Health check 대기 중..."
            done
            
            if [ "$HEALTH_OK" != "true" ]; then
              echo "⚠️ Health check 실패. 상세 정보 확인:"
              echo "PM2 상태:"
              $PM2_CMD status || true
              echo ""
              echo "PM2 로그 (최근 50줄):"
              $PM2_CMD logs chalog-backend --lines 50 --nostream || true
              echo ""
              echo "node_modules/class-transformer 확인:"
              ls -la node_modules/class-transformer 2>&1 || echo "class-transformer 없음"
              echo ""
              echo "class-transformer 패키지 정보:"
              cat node_modules/class-transformer/package.json 2>&1 | head -10 || echo "파일 없음"
              exit 1
            fi
            
            # 정리
            rm -f /tmp/deploy.tar.gz
          ENDSSH

      - name: Cleanup
        if: always()
        run: |
          rm -f ~/.ssh/deploy_key
          rm -rf backend/deploy-package backend/deploy.tar.gz /tmp/deploy_env

      - name: Deployment Summary
        if: success()
        run: |
          echo "✅ 배포 완료!"
          echo "🌐 Backend URL: http://${{ secrets.EC2_HOST }}:3000"
          echo "🏥 Health Check: http://${{ secrets.EC2_HOST }}:3000/api/health"

