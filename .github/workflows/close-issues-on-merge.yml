name: Close Issues on PR Merge

on:
  pull_request:
    types: [closed]
    branches: [main]

jobs:
  close-issues:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Close referenced issues
        uses: actions/github-script@v7
        with:
          # PR body/title are read as JS object properties (context.payload),
          # not interpolated into shell — no injection risk.
          script: |
            const title = context.payload.pull_request.title ?? '';
            const body = context.payload.pull_request.body ?? '';
            const text = `${title}\n${body}`;

            const pattern = /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s*#(\d+)/gi;
            const matches = [...text.matchAll(pattern)];

            if (matches.length === 0) {
              console.log('No issue references found.');
              return;
            }

            for (const match of matches) {
              const issueNumber = parseInt(match[1], 10);
              try {
                await github.rest.issues.update({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: issueNumber,
                  state: 'closed',
                  state_reason: 'completed',
                });
                console.log(`Closed issue #${issueNumber}`);
              } catch (e) {
                console.log(`Failed to close #${issueNumber}: ${e.message}`);
              }
            }
